  <style>
    :root {
      --accent-color: #ec4899;
      --bg-color: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #setup-screen,
    #game-screen {
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
    }

    /* Setup Screen Styles */
    .setup-header {
      background: var(--accent-color);
      width: 100%;
      padding: 20px;
      padding-top: 60px;
      border-radius: 0 0 24px 24px;
    }

    .setup-header h1 {
      color: white;
      font-size: 1.5em;
      text-align: center;
      margin-bottom: 10px;
    }

    .setup-container {
      background: #1c1c1e;
      border-radius: 16px;
      padding: 24px;
      margin: 20px;
      width: calc(100% - 40px);
    }

    .setup-container h2 {
      color: white;
      margin-bottom: 16px;
      font-size: 1.2em;
    }

    .setup-container p {
      color: #8e8e93;
      margin-bottom: 16px;
      line-height: 1.5;
      font-size: 0.9em;
    }

    .setup-container textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      font-family: inherit;
      resize: vertical;
      min-height: 140px;
      margin-bottom: 16px;
      background: #2c2c2e;
      color: white;
    }

    .setup-container textarea:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--accent-color);
    }

    .setup-container textarea::placeholder {
      color: #8e8e93;
    }

    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-generate:hover {
      background: #3367d6;
    }

    .generated-link {
      margin-top: 16px;
      padding: 16px;
      background: #2c2c2e;
      border-radius: 12px;
      display: none;
    }

    .generated-link.show {
      display: block;
    }

    .generated-link p {
      margin-bottom: 10px;
      color: #30d158;
      font-weight: 600;
    }

    .generated-link input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.85em;
      margin-bottom: 10px;
      background: #1c1c1e;
      color: white;
    }

    .generated-link .btn-copy {
      width: 100%;
      padding: 12px;
      background: #30d158;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .error-box {
      background: #3a2a2a;
      color: #ff6b6b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
      font-size: 0.9em;
    }

    .error-box.show {
      display: block;
    }

    .color-picker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .color-picker-row label {
      color: #8e8e93;
      font-size: 0.9em;
    }

    .color-picker-row input[type="color"] {
      width: 50px;
      height: 36px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
    }

    .message-input-row {
      margin-bottom: 16px;
    }

    .message-input-row label {
      display: block;
      color: #8e8e93;
      font-size: 0.9em;
      margin-bottom: 8px;
    }

    .message-input-row input[type="text"] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      background: #2c2c2e;
      color: white;
    }

    .message-input-row input[type="text"]:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--accent-color);
    }

    /* Game Screen Styles */
    .game-header {
      background: var(--accent-color);
      width: 100%;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header-left span {
      color: white;
      font-size: 0.8em;
      font-weight: 500;
    }

    .rank-bar {
      width: 80px;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      overflow: hidden;
    }

    .rank-bar-fill {
      height: 100%;
      background: white;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .header-center {
      text-align: center;
    }

    .score-display {
      font-size: 2.5em;
      font-weight: 300;
      color: white;
      line-height: 1;
    }

    .score-label {
      font-size: 0.75em;
      color: white;
      opacity: 0.9;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .header-right span {
      color: white;
      font-size: 0.8em;
      font-weight: 500;
    }

    .quartile-dots {
      display: flex;
      gap: 4px;
    }

    .quartile-dot {
      width: 16px;
      height: 16px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
    }

    .quartile-dot.filled {
      background: white;
    }

    .current-word-container {
      background: var(--accent-color);
      width: 100%;
      padding: 0 20px 20px 20px;
      border-radius: 0 0 24px 24px;
    }

    .current-word {
      background: #2c2c2e;
      border-radius: 16px;
      padding: 16px 20px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .current-word-text {
      color: #8e8e93;
      font-size: 1em;
    }

    .current-word-text.has-word {
      color: white;
      font-size: 1.2em;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: lowercase;
    }

    .game-body {
      flex: 1;
      width: 100%;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
    }


    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      position: relative;
    }

    .tile {
      aspect-ratio: 1.1;
      background: #2c2c2e;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1.25em;
      font-weight: 500;
      cursor: pointer;
      text-transform: lowercase;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      z-index: 1;
    }

    .tile:not(.completed):not(.animating):hover:not(.selected) {
      background: #3c3c3e;
    }

    .tile.selected {
      background: var(--accent-color);
      z-index: 2;
    }

    .tile.completed {
      background: #2c2c2e;
      outline: 3px solid var(--accent-color);
      outline-offset: -3px;
      cursor: default;
    }

    .tile.animating {
      position: absolute;
      z-index: 10;
      transition: top 0.4s ease-out, left 0.4s ease-out, background 0.4s ease-out;
    }

    .tile.placeholder {
      visibility: hidden;
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 0 20px;
      margin-top: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    }

    .btn-icon {
      width: 50px;
      height: 50px;
      border-radius: 25px;
      border: none;
      background: #2c2c2e;
      color: #8e8e93;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
    }

    .btn-icon:hover {
      background: #3c3c3e;
    }

    .btn-submit-main {
      width: 70px;
      height: 70px;
      border-radius: 35px;
      border: none;
      background: #2c2c2e;
      color: #8e8e93;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8em;
      transition: all 0.2s ease;
    }

    .btn-submit-main:not(:disabled):hover {
      background: #3c3c3e;
    }

    .btn-submit-main:not(:disabled) {
      background: #2c2c2e;
      color: white;
    }

    .btn-submit-main:disabled {
      background: #2c2c2e;
      color: #4c4c4e;
      cursor: not-allowed;
    }

    .message {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 50;
    }

    .message.show {
      opacity: 1;
    }

    .message.error {
      background: #3a2a2a;
      color: #ff6b6b;
    }

    .message.success {
      background: #1a3a2a;
      color: #30d158;
    }

    .victory {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .victory.show {
      opacity: 1;
      pointer-events: auto;
    }

    #fireworks-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .victory-content {
      background: #1c1c1e;
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.5s ease;
      margin: 20px;
      position: relative;
      z-index: 1;
    }

    .victory.show .victory-content {
      transform: scale(1);
    }

    .victory h2 {
      font-size: 1.8em;
      color: white;
      margin-bottom: 10px;
    }

    .victory p {
      color: #8e8e93;
      margin-bottom: 20px;
    }

    .victory .final-score {
      font-size: 4em;
      font-weight: 300;
      color: var(--accent-color);
    }

    .btn-play-again {
      margin-top: 24px;
      padding: 16px 40px;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-continue {
      margin-top: 16px;
      margin-bottom: 4px;
      padding: 16px 40px;
      background: transparent;
      color: var(--accent-color);
      border: 2px solid var(--accent-color);
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      display: block;
      width: 100%;
    }

    .btn-continue:hover {
      background: rgba(236, 72, 153, 0.15);
    }

    .tile.completed.selected {
      background: var(--accent-color);
      color: white;
      outline-color: transparent;
    }

    .tile.completed:hover {
      background: #3c3c3e;
    }

    /* Hide old elements */
    .buttons, .found-words {
      display: none;
    }

    .found-words-container {
      padding: 12px 20px;
      max-height: 120px;
      overflow-y: auto;
    }

    .words-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .word-tag {
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 0.85em;
      font-weight: 500;
      text-transform: lowercase;
    }

    .word-tag.quartile {
      background: var(--accent-color);
      color: white;
    }

    .word-tag.bonus {
      background: #2c2c2e;
      color: #8e8e93;
      border: 1px solid #3c3c3e;
    }

    @media (max-width: 400px) {
      .tile {
        font-size: 1.1em;
      }
      .score-display {
        font-size: 2em;
      }
    }
  </style>
